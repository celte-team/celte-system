
global
    log stdout format raw local0
    stats socket /tmp/haproxy.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    maxconn 4096
    user haproxy
    group haproxy
    daemon

defaults
    log global
    option tcplog
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

backend master_backend
    mode tcp
    balance roundrobin
    server master1 master1:9092 check
    server master2 master2:9093 check
    server master3 master3:9094 check

