name: Security Checks

on:
  push:
    branches: [ main, 213-add-cicd-security-tools ]
  pull_request:
    branches: [ main, 213-add-cicd-security-tools ]
  schedule:
    - cron: '0 2 * * 1' # Weekly scan every Monday at 02:00 UTC

jobs:
  # CodeQL Static Analysis is used to scan the codebase for vulnerabilities and code quality issues.
  # This job uses GitHub's CodeQL to perform static analysis on the codebase, identifying security vulnerabilities and code quality issues in supported languages (here: C# and C++).
  codeql:
    name: CodeQL Static Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: csharp
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - name: Restore dependencies
        run: dotnet restore master/*.csproj
      - name: Build
        run: dotnet build master/*.csproj --no-restore
      - uses: github/codeql-action/analyze@v3

  # Gitleaks scans the repository for secrets such as API keys, passwords, and other sensitive information that may have been accidentally committed.
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Dependency Review checks for vulnerable dependencies introduced by changes in pull requests, helping to prevent the introduction of known security issues via third-party packages.
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/dependency-review-action@v3

  # Trivy scans the entire repository filesystem for vulnerabilities, secrets, and misconfigurations with high severity, providing a comprehensive security assessment of the codebase and configuration files.
  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Manual Trivy Setup
        uses: aquasecurity/setup-trivy@v0.2.0
        with:
          cache: true
          version: latest
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          skip-setup-trivy: true

  # This job checks the permissions used by other GitHub Actions workflows to ensure they follow the principle of least privilege and do not have excessive access rights.
  permissions-check:
    name: GitHub Workflow Permissions Check
    runs-on: ubuntu-latest
    steps:
      - uses: github/actions-permissions-check@v1